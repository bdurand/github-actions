name: "Ruby CI"
description: "Shared Ruby CI steps: setup, bundle, specs, standardrb, yard"
inputs:
  ruby:
    description: "Ruby version"
    required: true
  appraisal:
    description: "Appraisal gemfile name (without extension)"
    required: false
    default: ""
  bundler:
    description: "Specific bundler version to install"
    required: false
    default: ""
  standardrb:
    description: "Run standardrb"
    required: false
    default: "false"
  yard:
    description: "Run yard doc"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Set up Ruby ${{ inputs.ruby }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "${{ inputs.ruby }}"
    - name: Setup bundler
      if: inputs.bundler != ''
      shell: bash
      run: |
        gem uninstall bundler --all
        gem install bundler --no-document --version ${{ inputs.bundler }}
    - name: Set bundle gemfile
      if: inputs.appraisal != ''
      shell: bash
      run: |
        gemfile="gemfiles/${{ inputs.appraisal }}.gemfile"
        echo "using gemfile $gemfile"
        echo "BUNDLE_GEMFILE=$gemfile" >> "$GITHUB_ENV"
    - name: Remove BUNDLED WITH from gemfile lock
      shell: bash
      run: |
        sed -i '/^BUNDLED WITH$/,+1d' "${BUNDLE_GEMFILE}.lock"
    - name: Install bundler
      shell: bash
      run: bundle install
      env:
        BUNDLE_JOBS: 3
        BUNDLE_RETRY: 3
    - name: Run specs
      shell: bash
      run: bundle exec rake spec
      env:
        RUBYOPT: '--enable=frozen-string-literal --debug=frozen-string-literal'
    - name: Run standardrb
      if: inputs.standardrb == 'true'
      shell: bash
      run: bundle exec standardrb
    - name: yard
      if: inputs.yard == 'true'
      shell: bash
      run: bundle exec yard doc --fail-on-warning
